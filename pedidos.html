<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Producción | Un Toque Especial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #ffffff; color: #1a1a1a; }
    .serif { font-family: 'Playfair Display', serif; }
    /* Eliminamos la clase .glass o la ponemos blanca sólida */
    .glass { background: #ffffff; }

        .perspective-container { perspective: 1000px; height: 420px; }
.card-inner { transition: transform 0.6s; transform-style: preserve-3d; position: relative; width: 100%; height: 100%; }
.card-flipped { transform: rotateY(180deg); }
.card-front, .card-back { backface-visibility: hidden; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.card-back { transform: rotateY(180deg); }

    </style>
</head>
<body class="p-4 md:p-8">

<header class="flex flex-col items-center justify-center mb-6 pt-4 px-4">
    <img src="logo.png" alt="Logo" class="h-40 -mb-4">
    
    <h1 class="serif text-3xl font-bold uppercase tracking-[0.2em] border-b border-black pb-0 leading-none">
        Lista de Pedidos
    </h1>
    
    <div class="mt-2 flex items-center gap-2 text-[9px] font-bold text-stone-500 uppercase tracking-widest">
        <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
        Sistema en línea
    </div>
</header>

    <div id="listaPedidos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

   <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAL3qDltyjx8laRhcy7LP7IUebGMNHRI_M",
            authDomain: "un-toque-especial.firebaseapp.com",
            projectId: "un-toque-especial",
            storageBucket: "un-toque-especial.firebasestorage.app",
            messagingSenderId: "795078620314",
            appId: "1:795078620314:web:89933274e966fa74c59b23"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Función elegante para eliminar con SweetAlert2
        window.terminarPedido = async (id, nombreCliente) => {
            const result = await Swal.fire({
                title: '¿Pedido Terminado?',
                text: `El pedido de ${nombreCliente} será eliminado del panel.`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#78535e',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Sí, finalizar'
            });

            if (result.isConfirmed) {
                try {
                    await deleteDoc(doc(db, "pedidos", id));
                    // Toast elegante de éxito
                    Swal.fire({
                        toast: true,
                        position: 'top-end',
                        icon: 'success',
                        title: 'Pedido finalizado correctamente',
                        showConfirmButton: false,
                        timer: 3000
                    });
                } catch (error) {
                    Swal.fire('Error', 'No se pudo completar la acción.', 'error');
                }
            }
        };

        const q = query(collection(db, "pedidos"), orderBy("timestamp", "desc"));
// La función onSnapshot abre el bloque aquí
onSnapshot(q, (snapshot) => {
    const lista = document.getElementById('listaPedidos');
    lista.innerHTML = "";

    // 1. Función para calcular tiempo transcurrido
    const calcularTiempo = (timestamp) => {
        if (!timestamp) return "Reciente";
        const fechaPedido = timestamp.toDate();
        const ahora = new Date();
        const diferenciaMs = ahora - fechaPedido;
        const minutos = Math.floor(diferenciaMs / 60000);
        const horas = Math.floor(minutos / 60);
        return horas > 0 ? `${horas}h ${minutos % 60}m atrás` : `${minutos}m atrás`;
    };

    // 2. Función para formato 12h
    const format12Hour = (timeString) => {
        let [hours, minutes] = timeString.split(':');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        return `${hours}:${minutes} ${ampm}`;
    };

    // 3. El ciclo forEach queda DENTRO del onSnapshot
    snapshot.forEach((docSnap) => {
        const p = docSnap.data();
        const id = docSnap.id;
        const [y, m, d] = p.fecha.split('-');
        const fechaF = `${d}/${m}/${y}`;
        const tiempo = calcularTiempo(p.timestamp);

        const card = document.createElement('div');
        // Mantengo tus clases originales, solo ajusté para que combine con el fondo blanco
        card.className = "bg-white p-5 rounded-2xl shadow-sm border border-stone-200 hover:border-black transition-all";
        
        card.innerHTML = `
    <div class="flex justify-between items-start mb-4">
        <div>
            <span class="text-[8px] font-black uppercase tracking-widest border border-stone-800 text-stone-800 px-2 py-0.5">${p.evento}</span>
            <h3 class="serif text-lg font-bold text-black mt-1">${p.cliente}</h3>
        </div>
        <div class="text-right">
            <p class="text-[8px] font-bold text-stone-400 mb-1"><i class="fas fa-clock mr-1"></i>${tiempo}</p>
            <button onclick="Swal.fire({imageUrl: '${p.boucher}', imageAlt: 'Boucher', showConfirmButton: false, width: 'auto', padding: '0', background: 'transparent', backdrop: 'rgba(0,0,0,0.7)', customClass: {image: 'm-0 max-h-[85vh] w-auto'}})" 
                    class="text-[9px] font-bold text-black border border-black px-3 py-1 hover:bg-black hover:text-white transition-colors">
                <i class="fas fa-image mr-1"></i> VER PAGO
            </button>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 text-[10px] mb-4">
       <div class="space-y-1">
            <p class="text-[8px] text-stone-400 uppercase font-bold border-b border-stone-100 pb-1 mb-2">Pastel</p>
            <p class="text-[10px] text-black"><b>Sabor:</b> ${p.sabor}</p>
            <p class="text-[10px] text-black"><b>Relleno:</b> ${p.relleno}</p>
            <p class="text-[10px] text-black"><b>Cobert:</b> ${p.cobertura}</p>
            <div class="flex items-center gap-1.5 text-[11px] text-black font-bold mt-2">
                <i class="fas fa-users"></i>
                <span>${p.porciones} Porciones</span>
            </div>
        </div>
        <div class="space-y-1">
            <p class="text-[8px] text-stone-400 uppercase font-bold border-b border-stone-100 pb-1 mb-2">Entrega</p>
            <div class="flex items-center gap-2 text-[10px] text-black"><i class="fas fa-map-marker-alt w-3"></i><span>${p.direccion}</span></div>
            <div class="flex items-center gap-2 text-[10px] text-black"><i class="fas fa-calendar-day w-3"></i><span>${fechaF}</span></div>
            <div class="flex items-center gap-2 text-[10px] text-black"><i class="fas fa-clock w-3"></i><span>${format12Hour(p.hora)}</span></div>
            <div class="flex items-center gap-2 text-[10px] text-black"><i class="fas fa-phone-alt w-3"></i><span>${p.telefono}</span></div>
        </div>
    </div>

    <div class="p-3 mb-4 border border-stone-200">
        <p class="text-[8px] text-stone-400 uppercase font-bold mb-1">Adornos solicitados</p>
        <p class="text-[10px] text-black font-medium italic">
            ${p.adornos || "Ninguno"}
        </p>
    </div>

    <div class="pt-3 border-t border-stone-200">
        <button onclick="window.terminarPedido('${id}', '${p.cliente}')" 
                class="w-full border border-black py-2 font-bold uppercase tracking-widest text-[10px] hover:bg-black hover:text-white transition-colors">
            Finalizar Pedido
        </button>
    </div>
`;
        lista.appendChild(card);
    }); 
});

    </script>
</body>
</html>
